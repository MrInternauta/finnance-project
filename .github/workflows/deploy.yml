name: CD — Build & Deploy

on:
  push:
    branches: ["main"]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 725667370394.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: pos_nest
  EKS_CLUSTER: posnest

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build-ecr.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push to ECR
        id: build-ecr
        run: |
          IMAGE=$ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          docker build -t $IMAGE -f backend/dockerfile backend/
          docker tag $IMAGE $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $IMAGE
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Push to Docker Hub
        uses: mr-smithers-excellent/docker-build-push@v6
        with:
          image: mrinternauta/finnance-backend
          tags: latest,${{ github.sha }}
          registry: docker.io
          dockerfile: backend/dockerfile
          directory: backend
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: Apply K8s manifests
        run: |
          kubectl apply -f backend/k8s/pos_nest/templates/reservations/deployment.yaml
          kubectl apply -f backend/k8s/pos_nest/templates/reservations/service.yaml
          kubectl apply -f backend/k8s/pos_nest/templates/ingress.yaml

      - name: Update image to SHA-tagged version
        run: |
          kubectl set image deployment/posnest \
            posnest=${{ needs.build.outputs.image }}

      - name: Wait for rollout
        run: kubectl rollout status deployment/posnest --timeout=120s
